<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="google" value="notranslate" />
        <meta http-equiv="Cache-Control" content="no-siteapp">
        <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
        <title><%= htmlWebpackPlugin.options.title %></title>
    </head>
    <body>
        <nav id="navigation" class="navbar navbar-dark bg-primary">
            <span class="navbar-brand mb-0">Visual Foreshadowing</span>
        </nav>
        <div id="container" class="container">
            <div class="row">
                <div class="col-2 pl-0">
                    <div id="editing" class="card mt-2 mx-auto">
                        <div id="editing-title" class="card-header badge badge-light">Editing</div>
                        <div id="editing-body" class="card-body pt-0">
                            <h7 id="item-title" class="card-subtitle text-muted">Select Item(s)</h7>
                            <select id="select-item" class="custom-select custom-select-sm mb-2" multiple="multiple"></select>
                            <h7 id="mode-title" class="card-subtitle text-muted mt-3">Foreshadowing Mode</h7>
                            <div id="select-mode">
                                <div class="custom-control custom-radio">
                                    <input type="radio" checked="true" name="custom-foreshadowing-radio" class="custom-control-input" id="explicit-radio" value="explicit">
                                    <label class="custom-control-label" for="explicit-radio">Explicit Foreshadowing</label>
                                </div>
                                <div class="custom-control custom-radio mb-2">
                                    <input type="radio" name="custom-foreshadowing-radio" class="custom-control-input" id="implicit-radio" value="implicit">
                                    <label class="custom-control-label" for="implicit-radio">Implicit Foreshadowing</label>
                                </div>
                            </div>
                            <h7 id="effect-title" class="card-subtitle text-muted">Effect</h7>
                            <select id="select-effect" class="custom-select custom-select-sm mb-2">
                                <option value="none">None</option>
                                <option value="prologue">Prologue</option>
                                <option value="pre-scene">Pre-scene</option>
                            </select>
                            <h7 id="caption-title" class="card-subtitle text-muted">Caption</h7>
                            <div class="mb-2">
                                <textarea class="form-control" id="input-prologue" rows="3"></textarea>
                            </div>
                            <h7 id="range-title" class="card-subtitle text-muted">Range</h7>
                            <div id="input-range" class="mb-3">
                                <input class="form-control form-control-sm" type="text" placeholder="from" id="input-text-range-from">
                                <span> - </span>
                                <input class="form-control form-control-sm" type="text" placeholder="to" id="input-text-range-to">
                            </div>
                            <button id="btn-add" class="btn btn-sm btn-primary" type="button">Add</button>
                        </div>
                    </div>
                    <div id ="animation-setting" class="card mt-3 mb-2 mx-auto">
                        <div id="animation-setting-title" class="card-header badge badge-light">Animation Setting</div>
                        <div id="animation-setting-body" class="card-body pt-0">
                            <h7 id="title-title" class="card-subtitle text-muted">Title</h7>
                            <div id="input-title">
                                <input class="form-control form-control-sm mb-1" type="text" value="Top Global Brands from 2000 to 2019" id="input-text-title">
                            </div>
                            <h7 id="subtitle-title" class="card-subtitle text-muted">SubTitle</h7>
                            <div id="input-subtitle">
                                <input class="form-control form-control-sm mb-1" type="text" value="Brand value, $m" id="input-text-subtitle">
                            </div>
                            <h7 id="interpolation-title" class="card-subtitle text-muted">Interpolation</h7>
                            <div id="input-interpolation">
                                <input class="form-control form-control-sm mb-1" type="number" value="5" id="input-text-interpolation">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-8">
                    <div id="foreshadowing" class="card mt-2 mx-auto">
                        <div id="preview-title" class="card-header badge badge-light">Preview</div>
                        <div id="prologue">Coca-Cola will drop to No.5 in 2018</div>
                    </div>
                    <div id ="timeline" class="card mt-3 mb-2 mx-auto">
                        <div id="timeline-title" class="card-header badge badge-light">Timeline</div>
                        <div id="timeline-div">
                            <div id="timeline-slider">
                                <input  id="play" type="button" value="&#9654;">
                                <input type="range" name="points" min="0" max="19" value="0" id="slider-time">
                            </div>
                            <div id="timeline-tick" class="mb-2"></div>
                            <div id="timeline-foreshadowing">
                                <div id='ford-white' class='white'></div>
                                <div id='ford-foreshadowing' class='foreshadowing-item'>
                                    <div id='ford-label' class="foreshadowing-item-name"><span class="badge badge-light">Ford</span></div>
                                    <div class="progress foreshadowing-timing mb-2">
                                        <div class="progress-empty" style="width: 0%"></div>
                                        <div class="progress-bar bg-info" style="width: 12%">E: Prologue</div>
                                    </div>
                                    
                                </div>
                                <div id='google-foreshadowing' class='foreshadowing-item'>
                                    <div id='google-white' class='white'></div>
                                    <div id='google-label' class="foreshadowing-item-name"><span class="badge badge-light">Google</span></div>
                                    <div class="progress foreshadowing-timing mb-2">
                                        <div class="progress-empty" style="width: 27%"></div>
                                        <div class="progress-bar bg-success" style="width: 26%">I: De-emphasis</div>
                                    </div>
                                </div>
                                <div id='apple-foreshadowing' class='foreshadowing-item'>
                                    <div id='apple-white' class='white'></div>
                                    <div id='apple-label' class="foreshadowing-item-name"><span class="badge badge-light">Apple</span></div>
                                    <div class="progress foreshadowing-timing mb-2">
                                        <div class="progress-empty" style="width: 58%"></div>
                                        <div class="progress-bar bg-success" style="width: 20%">I: Contour</div>
                                    </div>
                                    
                                </div>
                                <div id='coca-foreshadowing' class='foreshadowing-item'>
                                    <div id='coca-white' class='white'></div>
                                    <div id='coca-label' class="foreshadowing-item-name"><span class="badge badge-light">Coca-Cola</span></div>
                                    <div class="progress foreshadowing-timing mb-2">
                                        <div class="progress-empty" style="width: 78%"></div>
                                        <div class="progress-bar bg-info" style="width: 22%">E: Pre-scene</div>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-2 pl-0">
                    <div id="data-table-div" class="mt-2">
                        <h5 id="chart-loading-title" class="card-title">Data Input</h5>
                        <div id="data-table-div" class="input-group">
                            <div id="input-div" class="cunstom-file mb-2">
                                <input id="source-input-file" type="file" class="custom-file-input form-control-sm" >
                                <label id="source-file-label" class="custom-file-label col-form-label-sm" for="source-input-file">Choose data (.csv)</label>
                            </div>
                            <div id="data-table"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
